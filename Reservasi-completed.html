<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservasi Selesai - Achmad Sanusi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f1f5f9; color: #0f172a; min-height: 100vh; display: flex; flex-direction: column; }

        .header { width: 100%; height: 80px; background: linear-gradient(135deg, #dc2626, #991b1b); display: flex; align-items: center; padding: 0 3rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header-content { display: flex; align-items: center; gap: 1rem; cursor: pointer; }
        .header-icon { width: 40px; height: 40px; color: white; }
        .header-title { font-size: 22px; color: white; font-weight: 600; }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .success-card { background: white; max-width: 580px; width: 100%; padding: 3.5rem 2.5rem; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; }
        
        .success-icon { width: 110px; height: 110px; margin-bottom: 2rem; filter: drop-shadow(0 4px 10px rgba(34, 197, 94, 0.3)); }
        .title { font-size: 30px; font-weight: 800; color: #1e293b; margin-bottom: 1rem; letter-spacing: -0.5px; }
        .subtitle { font-size: 18px; font-weight: 500; color: #64748b; margin-bottom: 2rem; line-height: 1.5; max-width: 440px; }
        .contact-info { font-size: 22px; font-weight: 700; color: #0f172a; background-color: #f1f5f9; padding: 0.75rem 1.5rem; border-radius: 12px; border: 1px dashed #cbd5e1; }

        .back-btn { margin-top: 2.5rem; width: 100%; height: 50px; background-color: #0f172a; color: white; font-size: 16px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .back-btn:hover { background-color: #1e293b; transform: translateY(-1px); }
        .back-btn:active { transform: translateY(0); }

        .animate-fade-up { opacity: 0; animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content" onclick="window.location.href='Index.html'">
            <svg class="header-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L4 9v12h16V9l-8-6zm0 2.5l6 4.5v9h-4v-5H10v5H6v-9l6-4.5z"/></svg>
            <h2 class="header-title">Achmad Sanusi</h2>
        </div>
    </header>

    <main class="main-content">
        <div class="success-card animate-fade-up">
            <svg class="success-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="12" fill="#22c55e" />
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="white" />
            </svg>
            <h1 class="title">Reservasi Telah Selesai</h1>
            <p class="subtitle">Silahkan konfirmasi kepada admin jika terdapat perubahan jadwal aktuasi.</p>
            <p class="contact-info">hubungi : 111000011001</p>
            <button class="back-btn" id="btn-beranda">Kembali ke Beranda</button>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("btn-beranda").addEventListener("click", () => {
                window.location.href = "Index.html"; 
            });
        });
    </script>
</body>
</html>
